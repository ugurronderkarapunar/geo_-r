name: Update Feeds and Analyze
on:
  schedule:
    - cron: '0 */6 * * *'   # Her 6 saatte
  workflow_dispatch:         # Manuel çalıştırma için

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install feedparser openai
      - name: Fetch RSS
        env:
          GP_DB_PATH: geopolitical_pulse.db
        run: python fetch_feeds.py
      - name: Analyze with OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GP_DB_PATH: geopolitical_pulse.db
        run: python analyzer.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geopolitical_pulse.db
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update feeds and analyses"
          git push
