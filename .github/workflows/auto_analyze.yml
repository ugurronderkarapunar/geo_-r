name: Auto Fetch & Analyze

on:
  schedule:
    - cron: '*/30 * * * *'   # Her 30 dakikada bir (test için sık)
  workflow_dispatch:         # Manuel tetikleme

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run fetch and analyze
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GP_DB_PATH: geopolitical_pulse.db
        run: python fetch_and_analyze.py
      - name: Commit and push if database changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geopolitical_pulse.db
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update: fetch & analyze"
          git push
